services:
  # Backend Web Service
  - type: web
    name: hotel-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # Frontend Static Site
  - type: static
    name: hotel-frontend
    runtime: node
    buildCommand: npm install && npm run build
    publishPath: frontend/dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: hotel-backend
          property: host
